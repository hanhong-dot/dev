#
# This file is one of the central points in the Shotgun Pipeline Toolkit configuration and
# a counterpart to the folder configuration structure.
#
# The folder structure underneath the project folder is used to create folders on disk -
# templates.yml (this file) refers to those folders. Therefore, the two files need to be
# in sync. This file contains an overview of all locations that are used by Sgtk.
#
# Whenever an app or an engine refers to a location on disk, it is using an entry defined in
# this file. For more information, see the Shotgun Pipeline Toolkit Documentation.



#
# The keys section contains the definitions for all the different keys that are being
# used by Sgtk. A key is a magic token that is replaced by a value at runtime, for example
# {Shot}. The section below tells Sgtk which data types and formats to expect for each key.
#
keys:
  Sequence:
    type: str
  Shot:
    type: str
  Step:
    type: str
  sg_asset_type:
    type: str
  Asset:
    type: str
  name:
    type: str
    filter_by: alphanumeric
  iteration:
    type: int
  version:
    type: int
    format_spec: "03"
  version_four:
    type: int
    format_spec: "04"
    alias: version
  timestamp:
    type: str
  width:
    type: int
  height:
    type: int
  segment_name:
    type: str

  # Represents the optional output name for frames written by the Shotgun Write Node
  nuke.output:
    alias: output
    type: str
    filter_by: alphanumeric

  # Represents the optional output name for frames written by the After Effects Publish Rendering Plugin
  afx.comp:
    alias: comp
    type: str
    filter_by: alphanumeric
  afx.mov.ext:
    alias: extension
    type: str
    choices:
      mov: Quicktime Movie (.mov)
      avi: Audio Video Interleaved (.avi)

  SEQ:
    type: sequence
    format_spec: "04"

  # Represents a frame sequence exported from Flame
  flame.frame:
    type: sequence
    format_spec: "08"

  eye:
    type: str

  houdini.node:
    alias: node
    type: str
  aov_name:
    type: str

  # these are used by the Hiero exporter and pipeline
  YYYY:
    type: int
    format_spec: "04"
  MM:
    type: int
    format_spec: "02"
  DD:
    type: int
    format_spec: "02"
    alias: DD
  project:
    type: str

  # These are used for the Mari UDIM pipeline:
  UDIM:
    type: sequence
    default: "<UDIM>"
  mari.channel:
    type: str
    alias: channel
  mari.layer:
    type: str
    alias: layer
  mari.project_name:
    type: str
    alias: name
  asset_name:
    type: str
    shotgun_entity_type: Asset
    shotgun_field_name: code
  task_name:
    type: str
    shotgun_entity_type: Task
    shotgun_field_name: content

  # Maya supports two extension types.
  maya_extension:
    type: str
    choices:
      ma: Maya Ascii (.ma)
      mb: Maya Binary (.mb)
    default: ma
    alias: extension

  # needed by the Alias import as reference functionality
  alias.extension:
    type: str
    filter_by: alphanumeric

  # represents the optional render pass for frames written by VRED
  vred.render_pass:
    type: str
    filter_by: alphanumeric

  # represents the image extension for frames written by VRED
  vred.render_extension:
    type: str
    choices:
      png: PNG Image
      exr: EXR Image
    default: png

  # Represents a frame sequence exported from VRED
  vred.frame:
    type: sequence
    format_spec: "05"
    alias: SEQ


#
# The paths section contains all the the key locations where files are to be stored
# by Sgtk Apps. Each path is made up of several keys (like {version} or {shot}) and
# these are defined in the keys section above.
#
# Apps use these paths as part of their configuration to define where on disk
# different files should go.
#

paths:

  # Common  path definitions to use as shorthand in order to avoid repetitive and verbose
  # templates. This also makes it easy to change any of the common root paths and have the
  # changes apply to all templates that use them.
  #
  # These don't require the standard formatting (with definition and root_name) because they
  # will be set within each template that uses the alias.
  shot_root: shots/{Sequence}/{Shot}/{Step}/{task_name}
  asset_root: assets/{sg_asset_type}/{Asset}/{Step}
  sequence_root: sequences/{Sequence}


  ##########################################################################################
  #    thumbnail
  asset_thumbnail:
    definition: 'thumbnail/assets/{sg_asset_type}/{Asset}/{asset_name}.png'
  asset_task_thumbnail:
    definition: 'thumbnail/@asset_root/{asset_name}.{task_name}.png'
  asset_version_thumbnail:
    definition: 'thumbnail/assets/{sg_asset_type}/{Asset}/version/{asset_name}.png'
  shot_thumbnail:
    definition: 'thumbnail/shots/{Sequence}/{Shot}/{Shot}.png'
  shot_task_thumbnail:
    definition: 'thumbnail/@shot_root/{Shot}.{task_name}.png'
  shot_version_thumbnail:
    definition: 'thumbnail/shots/{Sequence}/{Shot}/version/{Shot}.png'



  #    data
  shot_data_work:
    definition: 'work/@shot_root/data'
  shot_data_publish:
    definition: 'publish/@shot_root/data'

  asset_data_work:
    definition: 'work/@asset_root/data'
  asset_data_publish:
    definition: 'publish/@asset_root/data'


  sequence_data_work:
    definition: 'work/@sequence_root/data'
  sequence_data_publish:
    definition: 'publish/@sequence_root/data'

  #thumbnail
  asset_thumbnail_work:
    definition: 'work/@asset_root/thumbnail'

  asset_thumbnail_publish:
    definition: 'publish/@asset_root/thumbnail'

  shot_thumbnail_work:
    definition: 'work/@shot_root/thumbnail'

  shot_thumbnail_publish:
    definition: 'publish/@shot_root/thumbnail'

  sequence_thumbnail_work:
    definition: 'work/@sequence_root/thumbnail'

  sequence_thumbnail_publish:
    definition: 'publish/@sequence_root/thumbnail'

    ##########################################################################################
  #version
  asset_version_dir:
    definition: 'publish/@asset_root/version'
  shot_version_dir:
    definition: 'publish/@shot_root/version'
  sequence_version_dir:
    definition: 'publish/@sequence_root/version'


    ##########################################################################################
  # Project level paths
  #

  #
  # Hiero
  #

  # The location of WIP files
  hiero_project_work:
    definition: 'editorial/work/{name}_v{version}.hrox'
  hiero_project_work_area:
